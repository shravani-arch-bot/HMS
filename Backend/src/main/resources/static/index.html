<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <header>
        <h1>🏥 Hospital Management System</h1>
        <p>Ward allocation, fee calculation, admission and discharge</p>
    </header>

    <section class="dashboard">
        <div class="stat-card">
            <h3>Heart Ward</h3>
            <p id="heartCount">0 / 2 Beds Occupied</p>
        </div>

        <div class="stat-card">
            <h3>ICU Ward</h3>
            <p id="icuCount">0 / 2 Beds Occupied</p>
        </div>

        <div class="stat-card">
            <h3>Total Patients</h3>
            <p id="totalCount">0 Records</p>
        </div>
    </section>

    <section class="main-grid">
        <div class="card">
            <h2>Admit / Checkup Patient</h2>

            <form id="patientForm">
                <input id="patientId" placeholder="Patient ID" required>
                <input id="name" placeholder="Patient Name" required>
                <input id="age" type="number" placeholder="Age" required>

                <select id="gender" required>
                    <option value="">Select Gender</option>
                    <option>Female</option>
                    <option>Male</option>
                    <option>Other</option>
                </select>

                <input id="disease" placeholder="Disease / Problem" required>
                <input id="phone" placeholder="Phone Number" required>

                <select id="type" required>
                    <option value="">Select Patient Type</option>
                    <option value="HEART">Heart Patient</option>
                    <option value="ICU">ICU Patient</option>
                    <option value="BASIC">Basic Checkup Patient</option>
                </select>

                <button type="submit">Admit / Checkup</button>
            </form>
        </div>

        <div class="card">
            <h2>Ward Bed Status</h2>
            <div id="wardStatus"></div>
        </div>
    </section>

    <section class="card">
        <div class="list-header">
            <h2>All Patients</h2>
            <button onclick="loadEverything()">Refresh</button>
        </div>

        <div id="patientList" class="patient-grid"></div>
    </section>
</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
